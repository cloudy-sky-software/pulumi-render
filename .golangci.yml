version: "2"
linters:
  enable:
    - goconst
    - gosec
    - misspell
    - nakedret
    - revive
    - unconvert
  disable:
    - lll
    - staticcheck
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - provider/cmd/pulumi-resource-render/schema.go
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - provider/cmd/pulumi-resource-render/schema.go
      - third_party$
      - builtin$
      - examples$
